# Experimental only. Use this on a separate test node and do not merge it with
# the stable LavaSrc profile, because many prefixes overlap.
lavalink:
  plugins:
    - dependency: "com.github.ItzRandom23:PulseLink:v1.6.2"
      repository: "https://jitpack.io"
      snapshot: false

plugins:
  pulselink:
    providers:
      - "ytsearch:%ISRC%"
      - "ytmsearch:%QUERY%"
      - "dzisrc:%ISRC%"
      - "dzsearch:%QUERY%"
      - "jssearch:%QUERY%"
      - "gnsearch:%QUERY%"
      - "admsearch:%QUERY%"
      - "bcsearch:%QUERY%"
      - "scsearch:%QUERY%"
    sources:
      spotify: true
      amazonmusic: true
      applemusic: true
      deezer: false
      yandexmusic: false
      vkmusic: false
      tidal: true
      qobuz: true
      ytdlp: true
      jiosaavn: true
      audiomack: true
      gaana: true
      shazam: true
      pandora: true
      flowerytts: true
      youtube: true
    lyrics-sources:
      deezer: false
      youtube: true
      yandexmusic: false
      vkmusic: false
      lrcLib: true
    spotify:
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
      resolveArtistsInSearch: true
      localFiles: false
    amazonmusic:
      searchLimit: 10
    applemusic:
      countryCode: "US"
    tidal:
      countryCode: "US"
      searchLimit: 6
    ytdlp:
      path: "./bin/yt-dlp"
      searchLimit: 10
    audiomack:
      searchLimit: 10
      artistTrackLimit: 25
    gaana:
      apiUrl: "https://gaanapi-wine.vercel.app/"
    soundcloud:
      searchLimit: 10
      userTrackLimit: 25
